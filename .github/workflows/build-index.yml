# Rebuilds index.json whenever manifests change on main and commits the result, so
# the raw URL the Community Store polls always serves the current compiled catalog.

name: Build index

on:
  push:
    branches: [main]
    paths:
      - 'manifests/**'
      - 'blocklist.json'
      - 'scripts/build-index.mjs'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rebuild index.json
        run: node scripts/build-index.mjs

      - name: Commit if changed
        run: |
          if git diff --quiet index.json; then
            echo "index.json unchanged."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.json
            git commit -m "chore: rebuild index.json"
            # Two merges landing close together can race this push; rebase and retry once.
            git push || (git pull --rebase && node scripts/build-index.mjs && git add index.json && git commit --amend --no-edit && git push)
          fi
